<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>еҜ’й…ёе•ҹзӨәйҢ„е»Је‘Ҡе°ҸйҒҠжҲІ</title>
<style>
  :root{ --panel:rgba(12,28,44,.8); --edge:rgba(255,255,255,.12); --money:#41b657; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#0a121c;font-family:"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;}
  #wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  #stage{position:relative;width:min(100vw,calc(100vh*0.5625));height:min(100vh,calc(100vw/0.5625));background:linear-gradient(#a9d8ea,#dff1f7 55%,#eef8fb);overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.5);}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:6px;padding:8px 10px;pointer-events:none;}
  #title{font-weight:800;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.45);font-size:16px;line-height:1;}
  #title small{display:block;font-size:7px;letter-spacing:2px;opacity:.85;}
  .res{display:flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--edge);border-radius:16px;padding:4px 10px 4px 6px;color:#fff;font-weight:800;font-size:14px;}
  .dot{width:14px;height:14px;border-radius:4px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.25);}
  #bag{position:absolute;top:42px;left:10px;display:flex;gap:5px;flex-wrap:wrap;max-width:70%;}
  .bagItem{display:flex;align-items:center;gap:3px;background:rgba(12,28,44,.6);border-radius:10px;padding:3px 7px;color:#fff;font-weight:700;font-size:11px;}
  #close{position:absolute;top:8px;right:10px;width:28px;height:28px;border-radius:50%;background:var(--panel);border:1px solid var(--edge);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;pointer-events:auto;}
  #reset{position:absolute;top:8px;right:44px;height:28px;padding:0 11px;border-radius:14px;background:var(--panel);border:1px solid var(--edge);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:3px;pointer-events:auto;cursor:pointer;}
  #reset:active{transform:scale(.94);}
  #cta{position:absolute;top:74px;left:10px;z-index:5;background:linear-gradient(#5ed46a,#2f9d43);color:#fff;font-weight:800;font-size:14px;border:2px solid #fff;border-radius:11px;padding:7px 14px;box-shadow:0 4px 0 #1f6e2e;animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  #hint{position:absolute;left:50%;top:15%;transform:translateX(-50%);color:#0b3a52;font-weight:800;font-size:14px;background:rgba(255,255,255,.72);padding:6px 14px;border-radius:18px;pointer-events:none;animation:fl 1.1s ease-in-out infinite;}
  @keyframes fl{0%,100%{transform:translateX(-50%)}50%{transform:translateX(-50%) translateY(-6px)}}
  #toast{position:absolute;left:50%;top:24%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;padding:9px 16px;border-radius:11px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;font-size:13px;max-width:80%;text-align:center;}
</style>
</head>
<body>
<div id="wrap"><div id="stage">
  <canvas id="cv"></canvas>
  <div id="top"><div id="title">еҜ’й…ёе•ҹзӨәйҢ„<small>BROKEOUT SURVIVAL</small></div>
    <div class="res"><span class="dot" style="background:var(--money)"></span><span id="money">0</span></div></div>
  <div id="bag"></div>
  <div id="reset">вҶә йҮҚзҪ®</div>
  <div id="close">вң•</div>
  <div id="cta">з«ӢеҚійҒҠзҺ© в–¶</div>
  <div id="hint">жӢ–жӣіз§»еӢ•дё»и§’ рҹ•№</div>
  <div id="toast"></div>
</div></div>
<script>
(()=>{
"use strict";
const cv=document.getElementById('cv'), ctx=cv.getContext('2d'), stage=document.getElementById('stage');
let W=540,H=960,DPR=1;
function resize(){ const r=stage.getBoundingClientRect(); W=Math.round(r.width); H=Math.round(r.height); DPR=Math.min(devicePixelRatio||1,2); cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); if(!S.__spread && W>=200){ S.__spread=true; spreadStations(); } }
addEventListener('resize',resize);

const TILE_W=44, TILE_H=30, GRID=14;
const oX=()=>W/2, oY=()=>Math.max(H*0.12, H*0.5-(GRID-1)*TILE_H/2);
function iso(c,r){ return { x:oX()+(c-r)*TILE_W/2, y:oY()+(c+r)*TILE_H/2 }; }
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

const RES={ wood:{name:'жңЁжқҗ',color:'#b07a44'}, cattle:{name:'з”ҹзүӣ',color:'#e9eef1'}, beef:{name:'зүӣиӮү',color:'#e0413a'}, ration:{name:'еҸЈзі§',color:'#f0a030'} };
const PRODUCTS=['beef','ration']; const PRICE={ beef:12, ration:26 };

const S={
  money:0,
  player:{pc:6,pr:6, bag:{wood:0,cattle:0,beef:0,ration:0}, gt:0, ft:0, bob:0},
  carryCap:12, gatherInt:0.45, moveSpeed:4, pMoveSpeed:4, pGatherInt:0.45, pPlaceInt:0.09, procInt:1.2, spawnInt:1.0, serveInt:0.2, priceMul:1,
  joy:{active:false,ox:0,oy:0,dx:0,dy:0},
  workers:[], cows:[], cubes:[],
  stations:[
    {id:'home',   type:'home', c:6,r:6, locked:false},
    {id:'tree1',  type:'source', yield:'wood', c:4,r:5, locked:false},
    {id:'tree2',  type:'source', yield:'wood', c:3,r:3, locked:true},
    {id:'butcher',type:'proc', ins:{cattle:1}, out:'beef',   inbuf:{cattle:0}, outbuf:0, pt:0, cap:10, procMul:0.30, c:5,r:1.5, locked:true},
    {id:'baker',  type:'proc', ins:{wood:1,beef:1}, out:'ration', inbuf:{wood:0,beef:0}, outbuf:0, pt:0, cap:10, procMul:0.40, c:8.5,r:5, locked:true},
    {id:'counter',type:'counter', c:7,r:11, stock:{beef:0,ration:0}, queue:[], queueMax:6, spawnT:0, serveT:0, cash:0, locked:true},
    {id:'woodmarket', type:'market', accept:'wood', price:6, c:1.5,r:8.5, locked:true},
    // е»әйҖ жЎҶйҸҲпјҡдҫқеәҸи§ЈйҺ–гҖҒй–ҖжӘ»ијғй«ҳпјҲдёҖж¬ЎеҸӘеҮәзҸҫдёҖеҖӢз•¶еүҚзӣ®жЁҷпјү
    {id:'frame1', type:'frame', need:{wood:8},   got:{wood:0},   c:6,r:8,  unlocks:['butcher','woodmarket','frame2'], spawnCows:3, locked:false},
    {id:'frame2', type:'frame', need:{beef:6},   got:{beef:0},   c:7,r:3.5,  unlocks:['counter','up_player','up_lumber','frame3'], locked:true},
    {id:'frame3', type:'frame', need:{wood:18},  got:{wood:0},   c:3.5,r:10.5, unlocks:['baker','up_rancher','up_clerk','up_clerk2','frame4'], locked:true},
    {id:'frame4', type:'frame', need:{ration:6}, got:{ration:0}, c:9,r:9,unlocks:['tree2','up_proc','up_spawn'], locked:true},
    // еҚҮзҙҡеҸ°пјҡдҫқеәҸи§ЈйҺ–гҖҒеғ№ж јијғй«ҳпјӣж•Јй–ӢеҲҶдҪҲйҒҝе…ҚжЁҷзұӨйҮҚз–Ҡ
    {id:'up_player', type:'upgrade', stat:'player',  label:'дё»и§’+', cost:90, acc:0, growth:1.25, c:1.5,r:4.5,  locked:true},
    {id:'up_lumber', type:'upgrade', stat:'lumber',  label:'дјҗжңЁе·Ҙ', cost:120, acc:0, growth:1.28, c:3.5,r:7,  locked:true},
    {id:'up_rancher',type:'upgrade', stat:'rancher', label:'зү§е ҙе·Ҙ', cost:200, acc:0, growth:1.3,  c:8.5,r:1.5, locked:true},
    {id:'up_proc',   type:'upgrade', stat:'proc',    label:'еҠ е·ҘйҖҹ', cost:320, acc:0, growth:1.28, c:10.5,r:3.5, locked:true},
    {id:'up_clerk',  type:'upgrade', stat:'clerkB',  label:'иӮүеә—е“Ў', cost:360, acc:0, growth:1.32, c:11,r:7, locked:true},
    {id:'up_clerk2', type:'upgrade', stat:'clerkR',  label:'зі§еә—е“Ў', cost:360, acc:0, growth:1.32, c:11,r:9, locked:true},
    {id:'up_spawn',  type:'upgrade', stat:'spawn',   label:'жӢӣе®ў',   cost:150, acc:0, growth:1.25, c:9,r:12, locked:true},
  ],
  snow:[], floats:[], started:false, time:0, obj:null,
};
for(let i=0;i<55;i++) S.snow.push({x:Math.random(),y:Math.random(),s:.4+Math.random()*.9});
function spawnCow(hx,hy){ S.cows.push({hx,hy,pc:hx,pr:hy,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,t:Math.random()*2,cd:0}); }
function scatterCows(n){ for(let i=0;i<n;i++) spawnCow(1.5+Math.random()*(GRID-3),1.5+Math.random()*(GRID-3)); } // зүӣеҲҶж•ЈеңЁең°ең–еҗ„иҷ•
function reconcileCows(){ const bu=st('butcher'); if(!bu||bu.locked) return; const target=Math.min(40, 3+Math.floor((upLvl('up_rancher')-1)/3)); while(S.cows.length<target) spawnCow(1.5+Math.random()*(GRID-3),1.5+Math.random()*(GRID-3)); } // зүӣж•ёйҡЁзү§е ҙе·ҘзӯүзҙҡиЈңеҲ° target(frame1 е®ҢжҲҗжүҚз”ҹгҖҒдёҠйҷҗ 40)пјҡLv1 3гҖҒLv30 12гҖҒLv100 36
// й–ӢеұҖдёҚж”ҫзүӣпјӣе®ҢжҲҗз¬¬дёҖеҖӢе»әйҖ пјҲи§ЈйҺ–еұ е®°еҸ°пјүжүҚж•ЈеёғеҮәзҸҫ
function st(id){ return S.stations.find(s=>s.id===id); }
// ===== еҚҮзҙҡзі»зөұпјҡеҸӘеӯҳгҖҢзӯүзҙҡ lvlгҖҚпјҢжүҖжңүжңғеӣ зӯүзҙҡи®ҠеӢ•зҡ„ж•ёеҖјйғҪз”ұзӯүзҙҡз”Ёе…¬ејҸжҸӣз®— =====
// иҰҒиӘҝе№іиЎЎпјҡж”№дёӢйқў recomputeStats иЈЎзҡ„е…¬ејҸеҚіеҸҜпјҲеӯҳжӘ”еҸӘиЁҳзӯүзҙҡпјҢеҘ—з”Ёж–°е…¬ејҸиҮӘеӢ•йҮҚз®—пјүгҖӮ
for(const s of S.stations) if(s.type==='upgrade'){ s.base=s.cost; s.lvl=1; }   // base=иө·е§ӢжҲҗжң¬пјӣзӯүзҙҡеҫһ 1 иө·з®—(Lv.1=жңӘеҚҮзҙҡ)
function upLvl(id){ const s=st(id); return s?(s.lvl||1):1; }
function syncWorkers(role,n){ let cur=0; for(const w of S.workers) if(w.role===role) cur++;
  for(let i=cur;i<n;i++) S.workers.push({role,pc:6,pr:6,carry:{res:'wood',amt:0},state:'load',t:0,bob:0,ang:Math.random()*6.28}); }
function recomputeStats(){ // е…¬ејҸз”ЁгҖҢзӯүзҙҡ-1гҖҚ(Lv.1=жңӘеҚҮзҙҡ=0 зҙҡеҠ жҲҗ)
  const lp=upLvl('up_player')-1, lpr=upLvl('up_proc')-1, lsp=upLvl('up_spawn')-1, lr=upLvl('up_rancher')-1;
  // вҖ”вҖ” дё»и§’еҠӣ(up_player)пјқе®№йҮҸйЎһ вҖ”вҖ”
  S.carryCap  = 12 + 2*lp;
  // вҖ”вҖ” еҠ е·ҘйҖҹ(up_proc)пјқйҖҹеәҰйЎһпјҡжҺЎйӣҶ/з§»еӢ•/з”ҹз”ўйғҪеҗғйҖҷеҖӢзӯүзҙҡ вҖ”вҖ”
  S.moveSpeed = Math.min(8, 4 + 0.4*lpr);                  // еҠ е·ҘйҖҹжҜҸзҙҡ +0.4(еҠ еӨ§)
  S.gatherInt = Math.max(0.18, 0.45 * Math.pow(0.80, lpr)); // жҺЎйӣҶ Г—1.25/зҙҡ(иҲҮз”ҹз”ўеҗҢжӯҘ)
  // вҖ”вҖ” дё»и§’е°Ҳеұ¬пјҡз§»йҖҹ/жҺЎйӣҶ йҡЁдё»и§’+(lp) йЎҚеӨ–жҸҗеҚҮпјҢдёҚеҪұйҹҝе·Ҙдәә вҖ”вҖ”
  S.pMoveSpeed = Math.min(12, S.moveSpeed * (1 + 0.10*lp));  // дё»и§’з§»йҖҹпјҡеңЁеҠ е·ҘйҖҹеҹәзӨҺдёҠеҶҚйҡЁдё»и§’+ +10%/зҙҡ
  S.pGatherInt = Math.max(0.06, S.gatherInt * Math.pow(0.85, lp)); // дё»и§’жҺЎйӣҶпјҡйҡЁдё»и§’+ жҜҸзҙҡеҶҚеҝ«(Г—0.85)
  S.pPlaceInt  = Math.max(0.017, 0.09 * Math.pow(0.80, lpr) * Math.pow(0.85, lp)); // дё»и§’ж”ҫзҪ®(жҠ•ж–ҷ/дәӨиІЁ/иіЈ/е……иғҪ)пјҡи·ҹжҺЎйӣҶеҗҢжӣІз·ҡйҡЁеҠ е·ҘйҖҹ+дё»и§’+еҠ еҝ«пјӣLv1 0.09вҶ’дёҠйҷҗвүҲ0.017(вүҲ60/s жҜҸе№ҖдёҠйҷҗ)
  S.procInt   = Math.max(0.004, 1.2 * Math.pow(0.80, lpr)); // з”ҹз”ўйҡЁеҠ е·ҘйҖҹзӯүзҙҡеҠ еҝ«пјӣbase 1.2 ж…ўиө·жӯҘгҖҒfloor 0.004(зҙ„Lv26и§ёй Ӯ)и®“еҫҢжңҹз”ўеҮәи·ҹеҫ—дёҠеӨҡе·Ҙдәәзҡ„жҗ¬йҒӢ(beefвүҲ1.85вҶ’555/s)
  // вҖ”вҖ” жӢӣе®ў(up_spawn) вҖ”вҖ”
  // дҫҶе®ўйҖҹпјҡеҸ–гҖҢеҺҹйңҖжұӮе…¬ејҸгҖҚиҲҮгҖҢдҫӣзөҰдёҠйҷҗгҖҚијғж…ўиҖ…вҶ’йңҖжұӮж°ёйҒ вүӨдҫӣзөҰ(зү§е ҙе·ҘГ—3)гҖҒдҪҮеҲ—дёҚе ҶпјӣдҪҺзӯүзҙҡеҺҹе…¬ејҸијғж…ўж•…дёҚи®Ҡ(е·Іе№іиЎЎ)
  S.spawnInt  = Math.max( 0.30 * S.procInt * (1 + lsp/2),  (1 + lsp/2) / (Math.max(1, lr) * 3.0) );
  S.serveInt  = 0.1  * S.procInt;                            // иіЈжқұиҘҝйҖҹзҺҮ(иӘҝеҝ« 0.2вҶ’0.1)пјҡжү№йҮҸзөҗеёіжӣҙеҝ«
  S.priceMul  = Math.pow(1.2, lsp);                          // жӢӣе®ўжҜҸзҙҡе”®еғ№жӣҙй«ҳ(еҠ еӨ§)
  S.maxQty    = 1 + lsp;                                      // жҜҸдҪҚе®ўдәәйңҖжұӮйҮҸ 1~maxQtyпјҢmaxQty йҡЁжӢӣе®ўзӯүзҙҡйҒһеўһ
  // вҖ”вҖ” з«ҷй»һиЎҚз”ҹ вҖ”вҖ”
  for(const s of S.stations){
    if(s.type==='proc') s.cap = 10 + 2*lp;                 // еұ е®°еҸ°/зғӨзҲҗз·©иЎқ
    else if(s.type==='counter') s.queueMax = 6 + lp;       // жҺ’йҡҠдёҠйҷҗ
    else if(s.type==='market') s.price = 6 + 2*lp;         // иіЈжңЁжқҗе–®еғ№
    else if(s.type==='upgrade') s.cost = Math.round(s.base * Math.pow(s.growth, (s.lvl||1)-1)); // дёӢдёҖзҙҡжҲҗжң¬
  }
  // вҖ”вҖ” жӢӣе·Ҙ(up_lumber/rancher/clerk)пјҡе·Ҙдәәж•ёпјқзӯүзҙҡ-1(Lv.1=0 дәә) вҖ”вҖ”
  syncWorkers('lumber',  upLvl('up_lumber')-1);
  syncWorkers('rancher', upLvl('up_rancher')-1);
  syncWorkers('clerkB',  upLvl('up_clerk')-1);    // иӮүеә—е“Ў(жҗ¬зүӣиӮү)пјҢup_clerk еҚҮзҙҡ
  syncWorkers('clerkR',  upLvl('up_clerk2')-1);   // зі§еә—е“Ў(жҗ¬еҸЈзі§)пјҢup_clerk2 еҚҮзҙҡ
  reconcileCows();                                // зүӣж•ёйҡЁзү§е ҙе·ҘзӯүзҙҡиЈңи¶і(frame1 еҫҢ)
}
recomputeStats();
// иҮӘеӢ•жҺ’й–Ӣпјҡз”ЁжҜҸеҖӢз«ҷй»һгҖҢжЁҷзұӨзҹ©еҪўгҖҚеҒҡ AABB жңҖе°Ҹе№із§»еҲҶйӣўпјҢдҝқиӯүжЁҷзұӨдёҚйҮҚз–ҠпјҲдёҖеӢһж°ёйҖёпјҢдёҚеҶҚжүӢеӢ•е–¬дҪҚзҪ®пјүгҖӮ
// йҮҳдҪҸй–ӢеұҖдёүд»¶пјҲзҮҹзҒ«/жЁ№/е»әйҖ жЎҶпјүи®“з·Ҡж№Ҡй–ӢеұҖдёҚиў«жҺЁеӢ•пјҢе…¶йӨҳз«ҷй»һз№һи‘—е®ғеҖ‘жҺ’й–ӢгҖӮ
// BOX[type]=[еҚҠеҜ¬, дёҠз·Јй«ҳ(label/ж•ёеӯ—жңҖй«ҳиҷ•), дёӢз·Јй«ҳ(еҗҚзЁұ/йҖІеәҰжўқжңҖдҪҺиҷ•)]пјҢзҡҶзӮәиһўе№•еғҸзҙ гҖӮ
function spreadStations(){ const HW=TILE_W/2, HH=TILE_H/2;
  const BOX={home:[16,16,20],source:[18,14,20],proc:[30,38,30],counter:[27,34,30],market:[27,32,18],frame:[23,48,24],upgrade:[27,24,20]};
  const PIN={home:1,tree1:1,frame1:1};
  // зҙ„жқҹпјҡжЁҷзұӨжЎҶдёҚеҮҶи¶…еҮәз•«йқў вҶ’ йҷҗеҲ¶ c-rпјҲж°ҙе№іпјүиҲҮ c+rпјҲеһӮзӣҙдёҠз·ЈпјҢйҒҝй–Ӣй ӮйғЁж©«е№…пјүгҖӮдҫқеҜҰйҡӣ WгҖҒoY иЁҲз®—гҖӮ
  const maxCR=(W/2-31)/HW, minSum=(175-oY()+48)/HH;
  const sp=s=>({x:(s.c-s.r)*HW, y:(s.c+s.r)*HH});
  const mv=(s,sx,sy)=>{ s.c=clamp(s.c+(sx/HW+sy/HH)/2,0.7,GRID-1.7); s.r=clamp(s.r+(sy/HH-sx/HW)/2,0.7,GRID-1.7);
    let d=s.c-s.r; const dc=clamp(d,-maxCR,maxCR); if(d!==dc){ const sh=(d-dc)/2; s.c-=sh; s.r+=sh; }
    const sm=s.c+s.r; if(sm<minSum){ const ad=(minSum-sm)/2; s.c+=ad; s.r+=ad; } };
  for(let it=0; it<200; it++){ let moved=false;
    for(let i=0;i<S.stations.length;i++) for(let j=i+1;j<S.stations.length;j++){
      const a=S.stations[i], b=S.stations[j], aMov=!PIN[a.id], bMov=!PIN[b.id];

  if(+n.toFixed(d)>=1000 && t<NUM_SUFFIX.length-1){ n/=1000; t++; d=2; } // йҖІдҪҚйӮҠз•Ң(999.99KвҶ’1.00M)

function updateProc(s,dt){ if(s.locked) return; const pi=S.procInt*(s.procMul||1);
  let has=true; for(const r in s.ins) if(s.inbuf[r]<s.ins[r]){ has=false; break; }
  if(!has){ if(s.pt>pi) s.pt=pi; return; }              // зјәж–ҷпјҡдёҚеӣӨз©ҚйҖІеәҰ(йҒҝе…ҚиЈңж–ҷеҫҢзҲҶйҮҸ)

    s.pt-=pi; for(const r in s.ins) s.inbuf[r]-=s.ins[r]; s.outbuf++; guard++;

function updateCounter(c,dt){ if(c.locked) return;

  const backlog=c.stock.beef+c.stock.ration, boost=1+Math.min(8, backlog/Math.max(1,S.maxQty)); // жҜҸ ~maxQty е–®дҪҚз©ҚеЈ“ +1Г—гҖҒдёҠйҷҗ 9Г—

      c.queue.push({want, qty:1+Math.floor(Math.random()*(S.maxQty||1))}); } g++; } // жү№йҮҸз”ҹе®ўгҖҒ800 и»ҹдёҠйҷҗйҳІзҲҶ

  if(earned>0) c._eAcc=(c._eAcc||0)+earned;                 // зҙҜз©ҚйҠ·е”®йЎҚ
  c._eT=(c._eT||0)+dt; if(c._eT>=0.5){ if(c._eAcc>0){ floatTxt(c.c,c.r,'+$'+fmt(c._eAcc),'#f3c34a'); c._eAcc=0; } c._eT=0; } // жҜҸ 0.5s жүҚеҷҙдёҖеҖӢеҗҲиЁҲжө®еӯ—(йҒҝе…Қй«ҳйҖҹиіЈеҮәжҷӮжө®еӯ—з–Ҡж»ҝж“Ӣз•«йқў)

function updateCows(dt){ for(const k of S.cows){
  // жңүжҺЎйӣҶиҖ…(зҺ©е®¶/зү§е ҙе·Ҙ)еңЁж—Ғ(вүӨ1.1)е°ұз«ҷи‘—дёҚеӢ•пјҢи®“дәәеғҸз ҚжЁ№дёҖжЁЈз«ҷи‘—йҖЈзәҢжҺЎгҖҒдёҚз”ЁиҝҪ
  let nearH = Math.hypot(S.player.pc-k.pc,S.player.pr-k.pr)<=1.1;

  if(nearH) continue;

  k.pc=clamp(k.pc,0.5,GRID-1.5); k.pr=clamp(k.pr,0.5,GRID-1.5); } }

function moveXY(w,tx,ty,off){ const ox=tx+(off?Math.cos(w.ang)*off:0), oy=ty+(off?Math.sin(w.ang)*off:0); const dx=ox-w.pc,dy=oy-w.pr,d=Math.hypot(dx,dy); if(d>0.1){ const step=Math.min(d,S.moveSpeed*0.7*tickDt); w.pc+=dx/d*step; w.pr+=dy/d*step; return false; } return true; }
function pickDest(res){ // дҫқйңҖжұӮжҢ‘зӣ®зҡ„ең°пјҡе»әйҖ жЎҶе„Әе…Ҳ вҶ’ зјәж–ҷе°Һеҗ‘ вҶ’ жүҚжӢҝеҺ»иіЈ
  const fr=S.stations.find(s=>s.type==='frame'&&!s.locked&&s.need[res]); if(fr) return fr;
  const bk=st('baker'), co=st('counter');
  if(res==='beef'){ // зүӣиӮүпјҡеҫҖеә«еӯҳијғе°‘зҡ„йӮЈйӮҠйҖҒ(е№іиЎЎ)пјӣе…©йӮҠйғҪзјә(йғҪеҝ«з©ә<2)е…ҲйҖҒзғӨзҲҗ(дҪңзі§)
    const bOk=bk&&!bk.locked, cOk=co&&!co.locked;
    if(bOk&&cOk&&co.queue.length){ const front=co.queue.slice(0,4); // жҺ’й ӯ(жңҖеӨҡ4дҪҚ)йғҪиІ·зі§гҖҒжІ’дәәиҰҒзүӣиӮү вҶ’ зүӣиӮүе…ЁйҖҒзғӨзҲҗдҪңзі§
      if(front.every(q=>q.want==='ration')) return bk; }
    if(bOk&&cOk){ const bb=bk.inbuf.beef, cb=co.stock.beef;
      if(bb<2 && cb<2) return bk;     // е…©йӮҠйғҪзјә вҶ’ зғӨзҲҗ
      return bb<=cb ? bk : co;        // еҗҰеүҮеҫҖеә«еӯҳе°‘зҡ„йӮЈйӮҠ(еҗҢе°‘жҷӮеҒҸзғӨзҲҗ)
    }
    if(cOk) return co; if(bOk) return bk; return null;
  }
  // жңЁжқҗпјҡзғӨзҲҗеЎ«еҲ°ж»ҝгҖҒе…¶йӨҳиіЈжңЁжқҗз«ҷпјӣеҸЈзі§пјҡеҸӘеҫҖж«ғеҸ°
  if(bk&&!bk.locked&&bk.inbuf[res]!==undefined && bk.inbuf[res]<bk.cap) return bk;
  if(res==='wood'){ const wm=st('woodmarket'); if(wm&&!wm.locked) return wm; }
  if(PRODUCTS.includes(res)){ if(co&&!co.locked) return co; }
  return null;
}
// з•¶дёӢжүҖжңүжңүж•Ҳзҡ„жңЁжқҗеҺ»еҗ‘пјҲе»әйҖ жЎҶйңҖж–ҷ вҶ’ зғӨзҲҗз”ҹз”ў вҶ’ иіЈжңЁжқҗжҸӣйҢўпјүпјӣдјҗжңЁе·Ҙдҫқзҙўеј•ијӘжөҒеҲҶй…ҚеҲ°дёҚеҗҢеҺ»еҗ‘гҖҒйҒҝе…ҚдёҖзҫӨдәәж“ еҗҢдёҖиҷ•
function woodDests(){ const d=[];
  for(const s of S.stations){ if(s.type==='frame'&&!s.locked&&s.need.wood&&s.got.wood<s.need.wood) d.push(s); }
  const bk=st('baker'); const bakerNeedsWood = bk&&!bk.locked&&bk.inbuf.wood<bk.inbuf.beef; // жңЁй ӯеә«еӯҳ < зүӣиӮүеә«еӯҳпјқжңЁй ӯжҳҜеҒҡзі§з“¶й ё вҶ’ иҰҒиЈңжңЁй ӯ
  if(bakerNeedsWood) d.push(bk);
  const wm=st('woodmarket'); if(wm&&!wm.locked && !bakerNeedsWood) d.push(wm); // жңЁй ӯ<зүӣиӮүжҷӮдёҚиіЈгҖҒе…ЁйҖҒзғӨзҲҗ(еҸҠе»әйҖ жЎҶ)пјӣжңЁй ӯвүҘзүӣиӮү(е·ІеӨ й…Қ)жүҚиіЈеӨҡйӨҳ
  return d;
}
function roleIndex(w){ let i=0; for(const x of S.workers){ if(x===w) return i; if(x.role===w.role) i++; } return 0; }
function doUnload(w,u){ const r=w.carry.res;
  if(u.type==='frame'){ if(u.got[r]<u.need[r]){ u.got[r]++; w.carry.amt--; if(u.got[r]>=u.need[r]){ for(const id of u.unlocks){const x=st(id);if(x)x.locked=false;} if(u.spawnCows)scatterCows(u.spawnCows); u.locked=true; toast('е·Ҙдәәи§ЈйҺ–дәҶж–°ең°еЎҠпјҒ'); } } /* ж»ҝдәҶдёҚж”¶гҖҒдёҚдёҹжЈ„пјӣеү©дёӢзҡ„з”ұ updateWorker ж”№йҖҒеҲҘиҷ• */ }
  else if(u.type==='proc'){ if(u.inbuf[r]!==undefined){u.inbuf[r]++;w.carry.amt--;} else w.carry.amt=0; } /* ијёе…Ҙеә«еӯҳз„Ўйҷҗе Ҷз–ҠпјҢдёҚеҶҚеӣ ж»ҝиҖҢдёҹжЈ„ */
  else if(u.type==='market'){ S.money+=u.price; w.carry.amt--; }
  else if(u.type==='counter'){ if(PRODUCTS.includes(r)){u.stock[r]++;w.carry.amt--;} if(u.cash>0){S.money+=u.cash;u.cash=0;} }
  else w.carry.amt--; }
function updateWorker(w){
  if(w.role==='rancher'){
    if(w.state==='load'){
      // йҺ–е®ҡдёҖйҡ»зӣ®жЁҷзүӣгҖҒжҺЎж»ҝдёҖи»ҠеүҚдёҚжҸӣпјӣжҢ‘гҖҢиў«жңҖе°‘зү§е ҙе·ҘзӣҜи‘—гҖҚзҡ„зүӣ(еҗҢзҘЁеҸ–жңҖиҝ‘)вҶ’иҮӘеӢ•еҲҶж•ЈпјҢдё”дёҚжңғеӣ зүӣз§»еӢ•жҜҸе№Җж”№дё»ж„ҸиҖҢжҠ–еӢ•
      if(!w._cow || S.cows.indexOf(w._cow)<0){ let best=null,bs=1e9; for(const k of S.cows){ const tg=S.workers.reduce((n,x)=>n+(x.role==='rancher'&&x._cow===k?1:0),0); const sc=tg*100+Math.hypot(w.pc-k.pc,w.pr-k.pr); if(sc<bs){bs=sc;best=k;} } w._cow=best; }
      const cow=w._cow;
      if(cow){ const dcow=Math.hypot(w.pc-cow.pc,w.pr-cow.pr); if(dcow>0.9) moveXY(w,cow.pc,cow.pr,0); } /* з§»еҗ‘зӣ®жЁҷзүӣгҖҒйҖІзҜ„еңҚ(0.9)е°ұеҒң */
      // йқ иҝ‘е°ұжҺЎ(з„ЎзүӣеҶ·еҚ»)гҖҒйҖҹзҺҮпјқжҺЎйӣҶйҖҹеәҰпјӣжҜҸијӘжҠҠзҜ„еңҚе…§(вүӨ1.0)жүҖжңүзүӣдёҖиө·жҺЎ
      w.t+=tickDt; if(w.t>=S.gatherInt){ w.t-=S.gatherInt; for(const k of S.cows){ if(w.carry.amt>=wcap()) break; if(Math.hypot(w.pc-k.pc,w.pr-k.pr)<=1.0){ w.carry.res='cattle'; w.carry.amt++; const cp=iso(k.pc,k.pr),wp=iso(w.pc,w.pr); flyCube(cp.x,cp.y-12,wp.x,wp.y-40,RES.cattle.color); w.bob=1; } } }
      if(w.carry.amt>=wcap()){ w.state='unload'; w._cow=null; w.t=0; }
    } else { if(!w.carry.amt){w.state='load';return;} const bu=st('butcher'); if(moveXY(w,bu.c,bu.r,0.8)){ w.t+=tickDt; if(w.t>=FLOW){ w.t-=FLOW; bu.inbuf.cattle++; w.carry.amt--; /* з”ҹзүӣијёе…Ҙз„Ўйҷҗе Ҷз–ҠгҖҒдёҚеҶҚеӣ ж»ҝиҖҢдёҹжЈ„ */ if(w.carry.amt<=0)w.state='load'; } } }
    w.bob=Math.max(0,w.bob-tickDt*5); return;
  }
  if(w.role==='lumber'){ const tr=S.stations.find(s=>s.type==='source'&&!s.locked);
    if(w.state==='load'){ if(tr&&moveXY(w,tr.c,tr.r,0.8)){ w.t+=tickDt; if(w.t>=S.gatherInt){ w.t-=S.gatherInt; w.carry.res='wood'; w.carry.amt++; w.bob=1; } }
      const _bk=st('baker'), _need=_bk&&!_bk.locked&&_bk.inbuf.wood<_bk.inbuf.beef, _send=_need?Math.min(wcap(),10):wcap(); // зғӨзҲҗзјәжңЁвҶ’з ҚдёҖе°Ҹжү№(вүӨ10)е°ұе…ҲйҖҒгҖҒдёҚз”Ёз Қж»ҝијүпјӣдёҚзјәеүҮжӯЈеёёиЈқж»ҝ
      if(w.carry.amt>=_send){ w.state='unload'; w._dest=null; } }
    else { if(!w.carry.amt){w.state='load'; w._dest=null; return;}
      if(!w._dest){ const dl=woodDests(); if(dl.length) w._dest=dl[roleIndex(w)%dl.length]; else w._dest=pickDest('wood'); }
      const u=w._dest; if(!u) return; if(moveXY(w,u.c,u.r,0.8)){
        if(u.type==='market'){ S.money+=u.price*w.carry.amt; w.carry.amt=0; w.state='load'; w._dest=null; } // иіЈжңЁжқҗж•ҙи»ҠдёҖж¬ЎиіЈжҺүгҖҒдёҚйҖҗеҖӢеҚЎжҷӮй–“вҶ’з«ӢеҲ»еӣһеҺ»жҺЎйӣҶ
        else { w.t+=tickDt; if(w.t>=FLOW){ w.t-=FLOW; doUnload(w,u); if(u.type==='frame'&&u.got[w.carry.res]>=u.need[w.carry.res]) w._dest=null; if(w.carry.amt<=0){w.state='load'; w._dest=null;} } } } }
    w.bob=Math.max(0,w.bob-tickDt*5); return;
  }
  // йҒӢијёе·ҘпјҡеҸ–еұ е®°еҸ°/зғӨзҲҗжҲҗе“Ғ вҶ’ дҫқйңҖжұӮйҖҒпјҲе»әйҖ жЎҶ вҶ’ зғӨзҲҗ вҶ’ иІ©е”®ж«ғеҸ°пјү
  const b=st('butcher'),bk=st('baker'),co=st('counter');
  if(w.state==='load'){ if(w.carry.amt===0){ // иӮүеә—е“Ў(clerkB)жҗ¬зүӣиӮүгҖҒзі§еә—е“Ў(clerkR)жҗ¬еҸЈзі§пјӣиҮӘе·ұйӮЈзЁ®зјәиІЁжҷӮжүҚж”ҜжҸҙеҸҰдёҖзЁ®(дёҚй–’зҪ®)
      const wantBeef = w.role==='clerkB';
      if(wantBeef) w.carry.res = b.outbuf>0 ? 'beef' : (bk.outbuf>0 ? 'ration' : null);
      else         w.carry.res = bk.outbuf>0 ? 'ration' : (b.outbuf>0 ? 'beef' : null); }
    const src = w.carry.res==='beef'?b : w.carry.res==='ration'?bk : null;
    if(src){ if(moveXY(w,src.c,src.r,0.8)){ w.t+=tickDt; if(w.t>=FLOW && src.outbuf>0){ w.t-=FLOW; src.outbuf--; w.carry.amt++; } } // еҲ°й»һйҖҗжӯҘжӢҝ(жҜҸ FLOW жӢҝ 1пјҢеӣһжӯёеҺҹжң¬йҖҹзҺҮгҖҒиҲҮеҚёиІЁзҜҖеҘҸдёҖиҮҙ)
      // иЈқж»ҝ carryCap жүҚйӣўй–ӢпјӣеҸӘжңүгҖҢеҮәж–ҷз©әдәҶдё”дҫҶжәҗзјәж–ҷеҒҡдёҚеҮәжӣҙеӨҡгҖҚжүҚеё¶еҚҠи»Ҡиө°(йҒҝе…Қз”ўз·ҡеҒңж“әеҚЎжӯ»)
      let canProd=true; for(const r in src.ins){ if((src.inbuf[r]||0)<src.ins[r]){ canProd=false; break; } }
      if(w.carry.amt>=wcap() || (w.carry.amt>0 && src.outbuf<=0 && !canProd)) w.state='unload'; }
    else if(co&&co.cash>0){ if(moveXY(w,co.c,co.r,0.8)){ S.money+=co.cash; co.cash=0; } } }
  else { if(!w.carry.amt){ w.state='load'; w.carry.res=null; w._dest=null; return; } if(!w._dest) w._dest=pickDest(w.carry.res)||co; const u=w._dest; if(!u) return; if(moveXY(w,u.c,u.r,0.8)){ w.t+=tickDt; if(w.t>=FLOW){ w.t-=FLOW; doUnload(w,u); /* ж•ҙи»ҠеҚёеңЁйҒёе®ҡзӣ®жЁҷпјӣеҸӘжңүе»әйҖ жЎҶж”¶ж»ҝжҷӮжүҚж”№йҖҒеү©йӨҳ */ if(u.type==='frame'&&u.got[w.carry.res]>=u.need[w.carry.res]) w._dest=null; if(w.carry.amt<=0){w.state='load';w.carry.res=null;w._dest=null;} } } }
  w.bob=Math.max(0,w.bob-tickDt*5);
}

let tickDt=1/60;
function update(dt){ tickDt=dt;
  const jx=S.joy.dx,jy=S.joy.dy,mag=Math.hypot(jx,jy);
  if(S.joy.active&&mag>0.06){ let dc=jx/(TILE_W/2)+jy/(TILE_H/2), dr=jy/(TILE_H/2)-jx/(TILE_W/2); const dl=Math.hypot(dc,dr)||1; S.player.pc=clamp(S.player.pc+dc/dl*S.pMoveSpeed*mag*dt,0,GRID-1); S.player.pr=clamp(S.player.pr+dr/dl*S.pMoveSpeed*mag*dt,0,GRID-1); }
  S.player.bob=Math.max(0,S.player.bob-dt*5);
  // дё»и§’дёҖж¬ЎеҸӘи·ҹгҖҢжңҖиҝ‘зҡ„дёҖеҖӢгҖҚз«ҷй»һдә’еӢ•пјҢйҒҝе…Қз«ҷеңЁж”¶йҢўй»һжҷӮиў«ж—ҒйӮҠеҚҮзҙҡеҸ°/дәӨд»ҳжЎҶиӘӨи§ёеҗёиө°иіҮжәҗ
  let best=null,bd=99;
  for(const s of S.stations){ if(s.locked||s.type==='home') continue; const rng=s.type==='upgrade'?1.3:1.4; const d=Math.hypot(S.player.pc-s.c,S.player.pr-s.r); if(d<=rng&&d<bd){bd=d;best=s;} }
  if(best) interact(S.player,best);
  harvestCows(S.player,dt);
  for(const w of S.workers) updateWorker(w);
  updateCows(dt);
  for(const s of S.stations){ if(s.type==='proc') updateProc(s,dt); else if(s.type==='counter') updateCounter(s,dt); }
  for(let i=S.floats.length-1;i>=0;i--){ const o=S.floats[i]; o.y+=o.vy*dt; o.life-=dt; if(o.life<=0)S.floats.splice(i,1); }
  for(let i=S.cubes.length-1;i>=0;i--){ const c=S.cubes[i]; c.t+=dt*c.sp; if(c.t>=1)S.cubes.splice(i,1); }
  for(const f of S.snow){ f.y+=dt*0.05*f.s; if(f.y>1)f.y=0; }
  S.time+=dt; S.obj=objective();
  const hb=document.getElementById('hint'); if(S.obj){ hb.textContent=S.obj.msg; hb.style.opacity='1'; } else hb.style.opacity='0';
  refreshHUD();
  S.saveT=(S.saveT||0)+dt; if(S.saveT>=2){ S.saveT=0; saveGame(); } // жҜҸ 2 з§’иҮӘеӢ•еӯҳжӘ”
}

function drawTile(c,r,locked){ const p=iso(c,r); ctx.beginPath(); ctx.moveTo(p.x,p.y-TILE_H/2); ctx.lineTo(p.x+TILE_W/2,p.y); ctx.lineTo(p.x,p.y+TILE_H/2); ctx.lineTo(p.x-TILE_W/2,p.y); ctx.closePath(); ctx.fillStyle=locked?'#cdd9e0':((c+r)%2?'#dceef6':'#eaf6fb'); ctx.fill(); ctx.strokeStyle='rgba(150,190,210,.35)'; ctx.lineWidth=1; ctx.stroke(); }
function person(x,y,bob,sc,body,hat,stack,lite){ const lift=bob*4; ctx.fillStyle='rgba(0,0,0,.15)'; ctx.beginPath(); ctx.ellipse(x,y,10*sc,5*sc,0,0,6.28); ctx.fill(); ctx.fillStyle=body; ctx.beginPath(); ctx.roundRect(x-8*sc,y-26*sc-lift,16*sc,22*sc,5*sc); ctx.fill(); ctx.fillStyle='#f0d2b0'; ctx.beginPath(); ctx.arc(x,y-30*sc-lift,7*sc,0,6.28); ctx.fill(); ctx.fillStyle=hat; ctx.beginPath(); ctx.arc(x,y-33*sc-lift,7.5*sc,Math.PI,0); ctx.fill();
  if(stack&&stack.length){ const n=stack.length, bw=15*sc, bh=6, base=y-39*sc-lift, mx=lite?3:5, max=Math.min(n,mx); // е·Ҙдәә(lite) жңҖеӨҡз•« 3гҖҒдё»и§’ 5
    for(let i=0;i<max;i++){ const by=base-i*(bh+1); ctx.fillStyle=stack[i]; ctx.fillRect(x-bw/2,by-bh,bw,bh); ctx.fillStyle='rgba(255,255,255,.3)'; ctx.fillRect(x-bw/2,by-bh,bw,2); ctx.fillStyle='rgba(0,0,0,.18)'; ctx.fillRect(x-bw/2,by-1,bw,1); }
    if(!lite && n>5){ ctx.fillStyle='#0b3a52'; ctx.font='800 10px sans-serif'; ctx.textAlign='center'; ctx.fillText('+'+fmt(n-5),x,base-5*(bh+1)-3); } } } // еҸӘжңүдё»и§’йЎҜзӨәгҖҢ+еү©йӨҳж•ёгҖҚпјӣе·ҘдәәдёҚйЎҜзӨә(жёӣе°‘ Lv100 ж•ёеӯ—йӣңиЁҠ)
function drawCow(x,y){ ctx.fillStyle='rgba(0,0,0,.12)'; ctx.beginPath(); ctx.ellipse(x,y,12,5,0,0,6.28); ctx.fill(); ctx.fillStyle='#f4f8fb'; ctx.beginPath(); ctx.ellipse(x,y-8,13,9,0,0,6.28); ctx.fill(); ctx.fillStyle='#3a3a3a'; ctx.beginPath(); ctx.ellipse(x-5,y-9,3,3,0,0,6.28); ctx.fill(); ctx.beginPath(); ctx.ellipse(x+4,y-6,4,3,0,0,6.28); ctx.fill(); ctx.fillStyle='#f4f8fb'; ctx.beginPath(); ctx.arc(x+11,y-12,5,0,6.28); ctx.fill(); ctx.fillStyle='#e7a0a8'; ctx.beginPath(); ctx.arc(x+13,y-10,2,0,6.28); ctx.fill(); }
function drawPile(x,baseY,frac,color,mb){ const blocks=Math.round(clamp(frac,0,1)*(mb||6)), bw=18,bh=5; for(let i=0;i<blocks;i++){ const by=baseY-i*(bh+1); ctx.fillStyle=color; ctx.fillRect(x-bw/2,by-bh,bw,bh); ctx.fillStyle='rgba(255,255,255,.3)'; ctx.fillRect(x-bw/2,by-bh,bw,2); ctx.fillStyle='rgba(0,0,0,.15)'; ctx.fillRect(x-bw/2,by-1,bw,1); } }
function drawBar(x,y,w,frac){ ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fillRect(x-w/2-1,y-1,w+2,6); ctx.fillStyle='#5ed46a'; ctx.fillRect(x-w/2,y,w*clamp(frac,0,1),4); }
function drawStation(s){ const p=iso(s.c,s.r);
  if(s.locked && s.type!=='frame'){ ctx.fillStyle='rgba(180,205,220,.5)'; ctx.beginPath(); ctx.ellipse(p.x,p.y,24,13,0,0,6.28); ctx.fill(); ctx.fillStyle='#0b3a52'; ctx.font='800 14px sans-serif'; ctx.textAlign='center'; ctx.fillText('рҹ”’',p.x,p.y-2); return; }
  if(s.type!=='upgrade'){ ctx.fillStyle='rgba(0,0,0,.12)'; ctx.beginPath(); ctx.ellipse(p.x,p.y+2,22,11,0,0,6.28); ctx.fill(); }
  if(s.type==='home'){ ctx.fillStyle='#5c3a1e'; ctx.fillRect(p.x-14,p.y-6,28,7); ctx.fillStyle='#7c5326'; ctx.fillRect(p.x-12,p.y-2,24,5);
    ctx.fillStyle='#f3a23a'; ctx.beginPath(); ctx.moveTo(p.x,p.y-30); ctx.quadraticCurveTo(p.x-9,p.y-12,p.x,p.y-8); ctx.quadraticCurveTo(p.x+9,p.y-12,p.x,p.y-30); ctx.fill(); ctx.fillStyle='#ffd66b'; ctx.beginPath(); ctx.moveTo(p.x,p.y-22); ctx.quadraticCurveTo(p.x-4,p.y-13,p.x,p.y-9); ctx.quadraticCurveTo(p.x+4,p.y-13,p.x,p.y-22); ctx.fill();
    ctx.fillStyle='#0b3a52'; ctx.font='700 10px sans-serif'; ctx.textAlign='center'; ctx.fillText('зҮҹзҒ«',p.x,p.y+16); }
  else if(s.type==='source'){ ctx.fillStyle='#7c4a26'; ctx.fillRect(p.x-6,p.y-42,12,42); ctx.fillStyle='#2f7d4f'; ctx.beginPath(); ctx.arc(p.x,p.y-48,19,0,6.28); ctx.fill(); ctx.fillStyle='#0b3a52'; ctx.font='700 10px sans-serif'; ctx.textAlign='center'; ctx.fillText('жңЁжқҗ',p.x,p.y+16); }
  else if(s.type==='proc'){ ctx.fillStyle=s.id==='butcher'?'#8a5a3a':'#9a6a30'; ctx.fillRect(p.x-22,p.y-24,44,26); ctx.fillStyle='rgba(255,255,255,.2)'; ctx.fillRect(p.x-22,p.y-24,44,6); ctx.strokeStyle='#5c3a1e'; ctx.lineWidth=2; ctx.strokeRect(p.x-22,p.y-24,44,26); ctx.fillStyle='#fff'; ctx.font='700 11px sans-serif'; ctx.textAlign='center'; ctx.fillText(s.id==='butcher'?'еұ е®°еҸ°':'зғӨзҲҗ',p.x,p.y+14); ctx.fillStyle=RES[s.out].color; ctx.font='800 11px sans-serif'; ctx.fillText('вҶ’'+RES[s.out].name[0]+fmt(s.outbuf),p.x,p.y-30); let it='',lack=false; for(const r in s.inbuf){ it+=RES[r].name[0]+fmt(s.inbuf[r])+' '; if(s.inbuf[r]<s.ins[r]) lack=true; } ctx.fillStyle=lack?'#d33':'rgba(11,58,82,.8)'; ctx.font='700 9px sans-serif'; ctx.fillText(it,p.x,p.y+1);
    if(lack){ const miss=Object.keys(s.inbuf).filter(r=>s.inbuf[r]<s.ins[r]).map(r=>RES[r].name).join('+'); ctx.fillStyle='#d33'; ctx.font='800 9px sans-serif'; ctx.fillText('вҡ зјә'+miss,p.x,p.y+25); } }
  else if(s.type==='counter'){ ctx.fillStyle='#3f6db0'; ctx.fillRect(p.x-24,p.y-20,48,22); ctx.fillStyle='#fff'; ctx.font='700 11px sans-serif'; ctx.textAlign='center'; ctx.fillText('иІ©е”®ж«ғеҸ°',p.x,p.y+13); ctx.fillStyle='rgba(11,58,82,.85)'; ctx.font='700 9px sans-serif'; ctx.fillText('иӮү'+fmt(s.stock.beef)+' зі§'+fmt(s.stock.ration),p.x,p.y-26); { const _m=(S.priceMul||1); ctx.fillStyle='#2f9d43'; ctx.font='800 10px sans-serif'; ctx.fillText('иӮү$'+fmt(Math.round(PRICE.beef*_m))+' зі§$'+fmt(Math.round(PRICE.ration*_m)),p.x,p.y+25); } if(s.cash>0){ drawPile(p.x,p.y-26,clamp(s.cash/50,0,1),'#f3c34a',6); ctx.fillStyle='#f3c34a'; ctx.font='800 12px sans-serif'; ctx.fillText('$'+fmt(s.cash),p.x,p.y-62); } const QN=Math.min(s.queue.length,8); for(let i=0;i<QN;i++){ const q=iso(s.c-1.0-i*0.8,s.r); person(q.x,q.y,0,0.55,'#7d8b99','#48586a'); const cu=s.queue[i]; ctx.fillStyle=RES[cu.want].color; ctx.beginPath(); ctx.arc(q.x,q.y-28,6,0,6.28); ctx.fill(); ctx.fillStyle='#fff'; ctx.font='800 8px sans-serif'; ctx.textAlign='center'; ctx.fillText(fmt(cu.qty),q.x,q.y-25); } if(s.queue.length>QN){ const q=iso(s.c-1.0-QN*0.8,s.r); ctx.fillStyle='#0b3a52'; ctx.font='800 10px sans-serif'; ctx.textAlign='center'; ctx.fillText('+'+fmt(s.queue.length-QN),q.x,q.y-24); } }
  else if(s.type==='market'){ ctx.fillStyle='#6a8a4a'; ctx.fillRect(p.x-24,p.y-20,48,22); ctx.fillStyle='#8aaa5a'; ctx.fillRect(p.x-24,p.y-20,48,6); ctx.strokeStyle='#46602e'; ctx.lineWidth=2; ctx.strokeRect(p.x-24,p.y-20,48,22); ctx.fillStyle='#fff'; ctx.font='700 11px sans-serif'; ctx.textAlign='center'; ctx.fillText('иіЈ'+RES[s.accept].name,p.x,p.y+13); ctx.fillStyle='#f3c34a'; ctx.font='800 11px sans-serif'; ctx.fillText('$'+fmt(s.price)+'/еҖӢ',p.x,p.y-26); }
  else if(s.type==='frame'){ const r=Object.keys(s.need)[0], frac=s.got[r]/s.need[r];
    ctx.fillStyle='rgba(243,195,74,.25)'; ctx.beginPath(); ctx.ellipse(p.x,p.y,26,14,0,0,6.28); ctx.fill();
    ctx.strokeStyle='#caa050'; ctx.lineWidth=3; ctx.setLineDash([6,4]); ctx.strokeRect(p.x-20,p.y-30,40,32); ctx.setLineDash([]);
    drawPile(p.x,p.y-2,frac,RES[r].color,6);
    ctx.fillStyle='#0b3a52'; ctx.font='800 11px sans-serif'; ctx.textAlign='center'; ctx.fillText('рҹ”Ёе»әйҖ ',p.x,p.y-42);
    ctx.fillStyle=RES[r].color; ctx.font='800 10px sans-serif'; ctx.fillText(RES[r].name+' '+s.got[r]+'/'+s.need[r],p.x,p.y+16);
    drawBar(p.x,p.y+21,42,frac); }
  else if(s.type==='upgrade'){ const frac=s.acc/s.cost;
    ctx.fillStyle='rgba(243,195,74,.18)'; ctx.beginPath(); ctx.ellipse(p.x,p.y,21,11,0,0,6.28); ctx.fill();
    drawPile(p.x,p.y-24,frac,'#f3c34a',3);
    ctx.fillStyle='#2f9d43'; ctx.beginPath(); ctx.roundRect(p.x-24,p.y-1,48,15,5); ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='800 10px sans-serif'; ctx.textAlign='center'; ctx.fillText('в¬Ҷ'+s.label,p.x,p.y+9);
    ctx.fillStyle='#0b3a52'; ctx.font='800 9px sans-serif'; ctx.fillText('Lv'+(s.lvl||1)+' '+fmt(Math.floor(s.acc))+'/'+fmt(s.cost),p.x,p.y-14);
    drawBar(p.x,p.y+18,46,frac); }
}
function draw(){ if(!S.__spread && W>=200){ S.__spread=true; spreadStations(); } ctx.clearRect(0,0,W,H);
  for(let su=0;su<=2*(GRID-1);su++) for(let c=0;c<GRID;c++){ const r=su-c; if(r>=0&&r<GRID) drawTile(c,r,false); }
  const objs=[];
  for(const s of S.stations){ if(s.locked) continue; objs.push({d:s.c+s.r-(s.type==='upgrade'?0.2:0.1), f:()=>drawStation(s)}); }
  // з•¶еүҚзӣ®жЁҷе…үз’°пјӢз®ӯй ӯ
  if(S.obj&&S.obj.t&&!S.obj.t.locked){ const tp=iso(S.obj.t.c,S.obj.t.r), pul=1+0.14*Math.sin(S.time*5);
    objs.push({d:99, f:()=>{ ctx.strokeStyle='rgba(243,195,74,.95)'; ctx.lineWidth=3.5; ctx.beginPath(); ctx.ellipse(tp.x,tp.y,28*pul,15*pul,0,0,6.28); ctx.stroke();
      ctx.fillStyle='#f3c34a'; ctx.font='800 24px sans-serif'; ctx.textAlign='center'; ctx.fillText('в–ј',tp.x,tp.y-56-5*Math.sin(S.time*5)); }}); }
  for(const k of S.cows){ const p=iso(k.pc,k.pr); objs.push({d:k.pc+k.pr, f:()=>drawCow(p.x,p.y)}); }
  for(const w of S.workers){ const p=iso(w.pc,w.pr); const col=w.role==='lumber'?'#5b7d4a':w.role==='rancher'?'#7a5a3a':w.role==='clerkB'?'#9c6b6b':w.role==='clerkR'?'#9c8a5b':'#6b6f9c'; const sk=carryStack(w.carry); objs.push({d:w.pc+w.pr, f:()=>person(p.x,p.y,w.bob,0.78,col,'#3a4a59',sk,true)}); } // е·Ҙдәә lite з№ӘиЈҪ(е°‘ж–№еЎҠгҖҒз„Ў+N)
  let _maxW=-Infinity; for(const w of S.workers){ const d=w.pc+w.pr; if(d>_maxW)_maxW=d; } // дё»и§’ z-index ж°ёйҒ еңЁжүҖжңүе·Ҙдәәд№ӢдёҠ
  const _pd=Math.max(S.player.pc+S.player.pr, _maxW+0.01);
  objs.push({d:_pd, f:()=>{ const p=iso(S.player.pc,S.player.pr); ctx.strokeStyle='rgba(40,120,220,.6)'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.ellipse(p.x,p.y,14,7,0,0,6.28); ctx.stroke(); person(p.x,p.y,S.player.bob,1,'#2f6db0','#21456e',bagStack(S.player.bag)); }});
  objs.sort((a,b)=>a.d-b.d).forEach(o=>o.f());
  for(const c of S.cubes){ const x=c.x+(c.tx-c.x)*c.t, y=c.y+(c.ty-c.y)*c.t-Math.sin(c.t*Math.PI)*28; ctx.fillStyle=c.color; ctx.fillRect(x-5,y-5,10,10); ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fillRect(x-5,y-5,10,3); }
  for(const o of S.floats){ ctx.globalAlpha=clamp(o.life*1.4,0,1); ctx.fillStyle=o.color; ctx.font=(o.big?'800 17px':'800 12px')+' sans-serif'; ctx.textAlign='center'; ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=3; ctx.strokeText(o.text,o.x,o.y); ctx.fillText(o.text,o.x,o.y); ctx.globalAlpha=1; }
  ctx.fillStyle='rgba(255,255,255,.85)'; for(const f of S.snow){ ctx.globalAlpha=.5*f.s; ctx.beginPath(); ctx.arc(f.x*W,f.y*H,f.s*1.5,0,6.28); ctx.fill(); } ctx.globalAlpha=1;
  if(S.joy.active){ const R=44; ctx.fillStyle='rgba(255,255,255,.3)'; ctx.beginPath(); ctx.arc(S.joy.ox,S.joy.oy,R,0,6.28); ctx.fill(); ctx.fillStyle='rgba(40,90,140,.85)'; ctx.beginPath(); ctx.arc(S.joy.ox+S.joy.dx*R,S.joy.oy+S.joy.dy*R,18,0,6.28); ctx.fill(); }
}

const elMoney=document.getElementById('money'), elBag=document.getElementById('bag');
function refreshHUD(){ elMoney.textContent=fmt(S.money); let h=''; for(const k of ['wood','cattle','beef','ration']){ if(S.player.bag[k]>0) h+=`<div class="bagItem"><span class="dot" style="width:11px;height:11px;background:${RES[k].color}"></span>${fmt(S.player.bag[k])}</div>`; } h+=`<div class="bagItem" style="opacity:.7">жҜҸзЁ®дёҠйҷҗ ${fmt(S.carryCap)}</div>`; elBag.innerHTML=h; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; clearTimeout(toast._t); toast._t=setTimeout(()=>t.style.opacity=0,1400); }

const hint=document.getElementById('hint');
function cvXY(e){ const r=cv.getBoundingClientRect(); return [(e.clientX-r.left)*W/r.width,(e.clientY-r.top)*H/r.height]; }
function jStart(x,y){ S.started=true; S.joy.active=true; S.joy.ox=x; S.joy.oy=y; S.joy.dx=0; S.joy.dy=0; }
function jMove(x,y){ if(!S.joy.active)return; const dx=x-S.joy.ox,dy=y-S.joy.oy,len=Math.hypot(dx,dy),max=44; if(len<.001){S.joy.dx=0;S.joy.dy=0;return;} const cl=Math.min(len,max)/max; S.joy.dx=dx/len*cl; S.joy.dy=dy/len*cl; }
function jEnd(){ S.joy.active=false; S.joy.dx=0; S.joy.dy=0; }
cv.addEventListener('pointerdown',e=>{e.preventDefault(); const p=cvXY(e); jStart(p[0],p[1]);});
cv.addEventListener('pointermove',e=>{const p=cvXY(e); jMove(p[0],p[1]);});
addEventListener('pointerup',jEnd); addEventListener('pointercancel',jEnd);
document.getElementById('cta').onclick=()=>toast('пјҲе»Је‘Ҡпјүе°Һеҗ‘е•Ҷеә—дёӢијүвҖҰ');
document.getElementById('close').onclick=()=>toast('пјҲе»Је‘Ҡпјүй—ңй–үйҲ•');

// ===== иҮӘеӢ•еӯҳжӘ” / и®ҖжӘ” / йҮҚзҪ® =====
const SAVE_KEY='whiteout_save_v1';
let resetting=false; // йҮҚзҪ®йҖІиЎҢдёӯе°ұдёҚеҶҚеӯҳжӘ”пјҲеҗҰеүҮ reload и§ёзҷјзҡ„ visibilitychange жңғжҠҠиҲҠйҖІеәҰеҸҲеӯҳеӣһеҺ»пјү
function saveGame(){ if(resetting) return; try{
  // еҸӘеӯҳгҖҢеҚҮзҙҡзӯүзҙҡ + йҒҠжҲІйҖІеәҰгҖҚпјӣжүҖжңүжңғеӣ зӯүзҙҡи®ҠеӢ•зҡ„ж•ёеҖј(carryCap/жҺЎйҖҹ/з§»йҖҹ/еҠ е·Ҙ/жӢӣе®ўж•Ҳжһң/еҗ„з«ҷcap/иіЈжңЁжқҗеғ№/е·Ҙдәәж•ёвҖҰ)
  // йғҪдёҚеӯҳпјҢи®ҖжӘ”жҷӮз”Ё recomputeStats еҫһзӯүзҙҡжҸӣз®—еӣһдҫҶгҖӮ
  const data={ v:3, money:S.money, cowsN:S.cows.length,
    stations:S.stations.map(s=>{ const o={id:s.id, locked:s.locked};
      if(s.type==='frame') o.got=Object.assign({},s.got);
      if(s.type==='upgrade'){ o.lvl=s.lvl||0; o.acc=s.acc; }       // вҶҗ зӯүзҙҡ + жң¬зҙҡе……иғҪйҖІеәҰ
      if(s.type==='proc'){ o.inbuf=Object.assign({},s.inbuf); o.outbuf=s.outbuf; }  // еә«еӯҳ(йқһзӯүзҙҡиЎҚз”ҹ)
      if(s.type==='counter'){ o.cash=s.cash; o.stock=Object.assign({},s.stock); }   // зҸҫйҮ‘+жҲҗе“Ғеә«еӯҳ
      return o; }) };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}catch(e){} }
function loadGame(){ try{
  const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false;
  const d=JSON.parse(raw); if(!d||d.v!==3) return false;
  if(typeof d.money==='number') S.money=d.money;
  if(Array.isArray(d.stations)) for(const so of d.stations){ const s=st(so.id); if(!s) continue;
    s.locked=so.locked;
    if(so.got&&s.got) for(const k in s.got){ if(k in so.got) s.got[k]=so.got[k]; }
    if(so.lvl!=null) s.lvl=so.lvl; if(so.acc!=null) s.acc=so.acc;        // вҶҗ еҚҮзҙҡзӯүзҙҡ + е……иғҪйҖІеәҰ
    if(so.inbuf&&s.inbuf) for(const k in s.inbuf){ if(k in so.inbuf) s.inbuf[k]=so.inbuf[k]; }
    if(so.outbuf!=null) s.outbuf=so.outbuf;
    if(so.cash!=null) s.cash=so.cash;
    if(so.stock&&s.stock) for(const k in s.stock){ if(k in so.stock) s.stock[k]=so.stock[k]; }
  }
  const _uc=st('up_clerk'),_uc2=st('up_clerk2'); if(_uc&&_uc2&&!_uc.locked&&_uc2.locked) _uc2.locked=false; // иҲҠеӯҳжӘ”зӣёе®№пјҡиӮүеә—е“ЎеҸ°е·Іи§ЈйҺ–еүҮзі§еә—е“ЎеҸ°д№ҹи§ЈйҺ–
  if(d.cowsN>0) scatterCows(d.cowsN);
  recomputeStats();   // дҫқйӮ„еҺҹзҡ„зӯүзҙҡпјҢз”Ёе…¬ејҸжҸӣз®—жүҖжңүиЎҚз”ҹж•ёеҖј(еҗ«еҗ„з«ҷcap/жҲҗжң¬гҖҒжӢӣеҮәе°ҚжҮүж•ёйҮҸзҡ„е·Ҙдәә)
  S.started=true;
  return true;
}catch(e){ return false; } }
document.getElementById('reset').onclick=()=>{ if(confirm('зўәе®ҡиҰҒйҮҚзҪ®жүҖжңүйҒҠжҲІйҖІеәҰе—ҺпјҹжӯӨеӢ•дҪңз„Ўжі•еҫ©еҺҹгҖӮ')){ resetting=true; try{ localStorage.removeItem(SAVE_KEY); }catch(e){} location.reload(); } };
document.addEventListener('visibilitychange',()=>{ if(document.hidden) saveGame(); });

let last=performance.now(),acc=0; const STEP=1/60;
function frame(now){ let dt=(now-last)/1000; last=now; dt=clamp(dt,0,0.1); acc+=dt; while(acc>=STEP){ update(STEP); acc-=STEP; } draw(); requestAnimationFrame(frame); }
loadGame(); resize(); refreshHUD(); requestAnimationFrame(frame);
})();
</script>
